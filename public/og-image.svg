  <g transform="translate(100, 120) scale(3.5)">
    <path d="M60 10 C30 25, 15 55, 20 85 C25 75, 35 65, 60 58 C85 65, 95 75, 100 85 C105 55, 90 25, 60 10Z" fill="#2b5d3a" opacity="0.12"/>
    <line x1="60" y1="18" x2="60" y2="82" stroke="#2b5d3a" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
    <line x1="60" y1="38" x2="38" y2="52" stroke="#2b5d3a" stroke-width="1" stroke-linecap="round" opacity="0.12"/>
    <line x1="60" y1="52" x2="34" y2="64" stroke="#2b5d3a" stroke-width="1" stroke-linecap="round" opacity="0.12"/>
    <line x1="60" y1="38" x2="82" y2="52" stroke="#2b5d3a" stroke-width="1" stroke-linecap="round" opacity="0.12"/>
    <line x1="60" y1="52" x2="86" y2="64" stroke="#2b5d3a" stroke-width="1" stroke-linecap="round" opacity="0.12"/>
  </g>

  <!-- Leaf icon (small, beside title) -->
