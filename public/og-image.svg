  <text x="180" y="520" font-family="ui-monospace, monospace" font-size="18" fill="#2b5d3a">66 STRATEGIES</text>
  <text x="430" y="520" font-family="ui-monospace, monospace" font-size="18" fill="#6b6b66">·</text>
  <text x="470" y="520" font-family="ui-monospace, monospace" font-size="18" fill="#2b5d3a">4 COLUMNS</text>
