    <path d="M60 10 C30 25, 15 55, 20 85 C25 75, 35 65, 60 58 C85 65, 95 75, 100 85 C105 55, 90 25, 60 10Z" fill="#2b5d3a"/>
    <line x1="60" y1="18" x2="60" y2="82" stroke="#faf9f5" stroke-width="2" stroke-linecap="round"/>
