version: 2
updates:
  # npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    # typescript の major 更新は @astrojs/check の peer dependency
    # (typescript@^5.0.0) と衝突して npm ci が失敗するため除外。
    # @astrojs/check が TypeScript 6 に対応した時点で、この ignore を削除する。
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # astro 7 は既定の Markdown プロセッサが "Sätteri" に切り替わり、
      # @astrojs/markdown-remark を同梱しなくなるため、現行の
      # markdown.remarkPlugins / rehypePlugins 設定を壊す
      # (コンパイラも Rust 実装に移行済み)。移行方針を検討するまで、
      # astro / @astrojs/react の major 更新を除外する。
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/react"
        update-types: ["version-update:semver-major"]
    groups:
      astro-ecosystem:
        patterns:
          - "astro"
          - "@astrojs/*"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      textlint:
        patterns:
          - "textlint"
          - "textlint-*"
      dev-tools:
        patterns:
          - "linkinator"
          - "typescript"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "github-actions"
