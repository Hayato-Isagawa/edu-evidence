name: Link Check

on:
  schedule:
    # Every Monday at 09:00 JST (00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/content/**"
      - "src/pages/**"
      - "src/layouts/**"

jobs:
  lychee:
    name: Check links with lychee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --accept '200,201,202,203,204,206,301,302,303,307,308,403,429'
            --exclude-mail
            --exclude '^#'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            './dist/**/*.html'
          fail: false
          format: markdown
          output: lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md

      - name: Create issue if links failed
        if: env.lychee_exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "リンク切れ検出: ${{ github.run_id }}"
          content-filepath: lychee-report.md
          labels: |
            link-rot
            automated
