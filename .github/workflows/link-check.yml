name: Link Check

on:
  schedule:
    # Every Monday at 09:00 JST (00:00 UTC Monday)
    - cron: "0 0 * * 1"
  workflow_dispatch:

# Note: Removed push trigger to avoid running on every content commit.
# Use workflow_dispatch for ad-hoc manual checks.

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links with lychee
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Restore lychee cache
        id: lychee-cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          # Accept broader status codes (many publishers/journals block
          # bots but work for humans)
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --accept 200,201,202,203,204,206,301,302,303,307,308,403,429,503
            --exclude 'doi\.org/10\.1037'
            --exclude 'us\.corwin\.com'
            --timeout 30
            --max-retries 2
            './dist/**/*.html'
          fail: false
          format: markdown
          output: lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report-${{ github.run_id }}
          path: lychee-report.md
          retention-days: 14

      - name: Summarize in job output
        if: always()
        run: |
          if [ -f lychee-report.md ]; then
            {
              echo "## Lychee Link Check Report"
              echo ""
              cat lychee-report.md
            } >> $GITHUB_STEP_SUMMARY
          else
            echo "## Lychee Link Check Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No report file was generated." >> $GITHUB_STEP_SUMMARY
          fi
